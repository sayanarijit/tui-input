name: Continuous Integration
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test --all-features
      - name: Run lint
        run: cargo clippy -- -D warnings
      - name: Run fmt
        run: cargo fmt --check
